<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login y Registro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favico-32x32.png">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container-fluid d-flex align-items-center justify-content-center apomat-bg" style="min-height: 100vh;">
        <div class="row w-100 justify-content-center">
            <div class="col-11 col-sm-8 col-md-5 col-lg-4">
                <div class="card shadow-sm apomat-card">
                    <div class="card-body text-center">
                        <img src="/img/logo-apomat.png" alt="Apomat" class="apomat-logo">
                    </div>

                    <ul class="nav nav-tabs nav-fill apomat-tabs" id="auth-tabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <a class="nav-link active" href="#login" id="login-tab">Iniciar Sesión</a>
                        </li>
                        <li class="nav-item" role="presentation">
                            <a class="nav-link" href="#register" id="register-tab">Registrarse</a>
                        </li>
                    </ul>

                    <!-- Vista de LOGIN -->
                    <div id="login-view" class="view-container">
                        <form action="/login" method="POST" autocomplete="off">
                            <div class="card-body">
                                <div class="mb-3">
                                    <label for="email" class="form-label">Correo electrónico</label>
                                    <input type="email" required placeholder="ejemplo@correo.com" id="email" name="email" class="form-control" autocomplete="off">
                                </div>

                                <div class="mb-3 position-relative">
                                    <label for="password" class="form-label">Contraseña</label>
                                    <input type="password" required placeholder="Tu contraseña" id="password" name="password" class="form-control" autocomplete="new-password">
                                    <i class="material-icons" id="toggle-login-password"
                                        onclick="togglePassword('password', 'toggle-login-password')"
                                        style="position: absolute; right: 12px; top: 42px; cursor: pointer; color: #9e9e9e;">
                                        visibility
                                    </i>
                                </div>

                                <button class="btn apomat-btn w-100" type="submit" name="action">
                                    Iniciar Sesión
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- la seccion del registro -->
                    <div id="register-view" class="view-container" style="display: none;">
                        <form id="register-form" action="/register" method="POST" autocomplete="off">
                            <div class="card-body">
                                <div class="mb-3">
                                    <label for="register-name" class="form-label">Nombre completo</label>
                                    <input type="text" required placeholder="Tu nombre completo" id="register-name" name="full_name" class="form-control">
                                </div>

                                <div class="mb-3">
                                    <label for="register-email" class="form-label">Correo electrónico</label>
                                    <input type="email" required placeholder="ejemplo@correo.com" id="register-email" name="email" class="form-control" autocomplete="off">
                                </div>

                                <div class="mb-3 position-relative">
                                    <label for="register-password" class="form-label">Contraseña</label>
                                    <input type="password" autocomplete="new-password" required placeholder="Mínimo 8 caracteres" id="register-password" name="password" class="form-control">
                                    <i class="material-icons" id="toggle-register-password" onclick="togglePassword('register-password','toggle-register-password' )"
                                        style="position: absolute; right: 12px; top: 42px; cursor: pointer; color: #9e9e9e;">
                                        visibility
                                    </i>
                                </div>

                                <div class="mb-3 position-relative">
                                    <label for="register-confirm-password" class="form-label">Confirmar contraseña</label>
                                    <input type="password" autocomplete="new-password" required placeholder="Repite tu contraseña" id="register-confirm-password" name="confirm_password" class="form-control">
                                    <i class="material-icons" id="toggle-register-confirm-password" onclick="togglePassword('register-confirm-password','toggle-register-confirm-password' )"
                                        style="position: absolute; right: 12px; top: 42px; cursor: pointer; color: #9e9e9e;">
                                        visibility
                                    </i>
                                </div>

                                <button class="btn apomat-btn w-100" type="submit" name="action">
                                    crear cuenta
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Muestra el mensaje de error si la URL tiene ?error=credenciales
        const params = new URLSearchParams(window.location.search);

        if (params.get("error") === "credenciales") {
            Swal.fire({
                icon: "error",
                title: "Inicio de sesión fallido",
                text: "Correo o contraseña incorrectos.",
                confirmButtonText: "Intentar nuevamente",
                confirmButtonColor: "#d32f2f"
            });
        }

        // Función para mostrar u ocultar la contraseña
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        // Animación de cambio entre vistas
        const loginTab = document.getElementById('login-tab');
        const registerTab = document.getElementById('register-tab');
        const loginView = document.getElementById('login-view');
        const registerView = document.getElementById('register-view');

        // Función para mostrar la vista de login
        function showLogin() {
            registerView.style.animation = 'slideIn 0.5s ease reverse';
            setTimeout(() => {
                registerView.style.display = 'none';
                loginView.style.display = 'block';
                loginView.style.animation = 'slideIn 0.5s ease';
            }, 250);

            loginTab.classList.add('active');
            registerTab.classList.remove('active');
        }

        // Función para mostrar la vista de registro
        function showRegister() {
            loginView.style.animation = 'slideIn 0.5s ease reverse';
            setTimeout(() => {
                loginView.style.display = 'none';
                registerView.style.display = 'block';
                registerView.style.animation = 'slideIn 0.5s ease';
            }, 250);

            registerTab.classList.add('active');
            loginTab.classList.remove('active');
        }

        loginTab.addEventListener('click', (e) => {
            e.preventDefault();
            showLogin();
        });

        registerTab.addEventListener('click', (e) => {
            e.preventDefault();
            showRegister();
        });

        const registerForm = document.getElementById("register-form");

        registerForm.addEventListener(
            "submit",

            // Validación de contraseña en el formulario de registro
            function(event) {
                const password = document.getElementById("register-password").value;
                const confirmPassword = document.getElementById("register-confirm-password").value;

                // Validar que la contraseña tenga al menos 8 caracteres
                if (password.length < 8) {
                    event.preventDefault();

                    Swal.fire({
                        icon: "warning",
                        title: "Contraseña muy corta",
                        text: "La contraseña debe tener mínimo 8 caracteres.",
                        confirmButtonText: "Entendido",
                        confirmButtonColor: "#d32f2f"
                    });

                    return;
                }

                // Validar que ambas contraseñas coincidan
                if (password !== confirmPassword) {
                    event.preventDefault();

                    Swal.fire({
                        icon: "warning",
                        title: "Las contraseñas no coinciden",
                        text: "Verifica que ambas contraseñas sean iguales.",
                        confirmButtonText: "Entendido",
                        confirmButtonColor: "#d32f2f"
                    });

                    return;
                }
            }
        );

        // Reset de formularios al volver a la página (incluye el caché
        // de "atrás/adelante" del navegador) Y al cargar la página normal
        function limpiarFormularios() {
            document.querySelectorAll("form").forEach((formulario) => {
                formulario.reset();
            });
        }

        window.addEventListener("pageshow", limpiarFormularios);
        document.addEventListener("DOMContentLoaded", limpiarFormularios);

        // Mostrar mensaje de error si el correo ya está registrado
        if (params.get("error") === "correo_existente") {
            showRegister();

            Swal.fire({
                icon: "warning",
                title: "Correo ya registrado",
                text: "Ya existe una cuenta con ese correo electrónico.",
                confirmButtonText: "Entendido",
                confirmButtonColor: "#d32f2f"
            });
        }

        // Mostrar mensaje de error si la contraseña es muy corta
        if (params.get("error") === "password_corta") {
            showRegister();

            Swal.fire({
                icon: "warning",
                title: "Contraseña muy corta",
                text: "La contraseña debe tener mínimo 8 caracteres.",
                confirmButtonText: "Entendido",
                confirmButtonColor: "#d32f2f"
            });
        }
    </script>
</body>
</html>
