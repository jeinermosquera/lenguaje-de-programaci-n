<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apomat — Pedido exitoso</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="/site/css/pedido-exitoso.css" />
  <link rel="icon" type="image/png" href="/site/favicon/favico-32x32.png">
</head>
<body>
  <div class="card">
    <div class="icon"><i class="bi bi-check-circle-fill"></i></div>
    <h1>Pago exitoso</h1>
    <p id="mensaje-exito">Tu pedido ha sido procesado correctamente.</p>
    <p style="font-size:0.85rem;">Recibirás un correo con los detalles de tu compra y la información de envío.</p>
    <div class="btn-row">
      <a href="/dashboard" class="btn btn-primary">Volver al inicio</a>
      <a href="/productos" class="btn btn-primary">Seguir comprando</a>
    </div>
  </div>
  <script>
    var ref = new URLSearchParams(window.location.search).get('referencia');
    if (ref) { document.getElementById('mensaje-exito').textContent = 'Referencia: ' + ref + '. Tu pedido ha sido procesado correctamente.'; }
    var backupUser = localStorage.getItem("apomat_carrito_user") || "0";
    localStorage.removeItem("apomat_carrito_backup_" + backupUser);
  </script>
</body>
</html>
