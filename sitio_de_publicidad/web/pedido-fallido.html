<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apomat — Pago no completado</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="/site/css/pedido-fallido.css" />
  <link rel="icon" type="image/png" href="/site/favicon/favico-32x32.png">
</head>
<body>
  <div class="card">
    <div class="icon"><i class="bi bi-x-circle-fill"></i></div>
    <h1>Pago no completado</h1>
    <p>El pago no pudo ser procesado. Puedes intentarlo de nuevo.</p>
    <div class="btn-row">
      <a href="/pago" class="btn btn-primary">Intentar de nuevo</a>
      <a href="/productos" class="btn btn-primary">Seguir comprando</a>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    var backupUser = localStorage.getItem("apomat_carrito_user") || "0";
    var backupKey = "apomat_carrito_backup_" + backupUser;
    var fb = localStorage.getItem(backupKey);
    if (fb) { localStorage.setItem("apomat_carrito", fb); localStorage.removeItem(backupKey); }
  </script>
</body>
</html>
