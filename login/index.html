<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
    rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .card-section { display: none; }
        .card-section.active { display: block; }
        .error-msg { color: #ef9a9a; font-size: 0.9rem; text-align: center; margin: 8px 0; }
        .success-msg { color: #a5d6a7; font-size: 0.9rem; text-align: center; margin: 8px 0; }
        .switch-link { text-align: center; margin-top: 20px; color: white; }
        .switch-link a { color: #90caf9; font-weight: bold; cursor: pointer; }
        .strength-bar { height: 4px; border-radius: 4px; margin-top: 4px; transition: all 0.3s; }
        .strength-weak { width: 33%; background: #ef5350; }
        .strength-medium { width: 66%; background: #ffa726; }
        .strength-strong { width: 100%; background: #66bb6a; }
        .toggle-link { color: #90caf9; cursor: pointer; font-size: 14px; }
        .toggle-link:hover { text-decoration: underline; }
        .row-actions { margin-top: 16px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="login-card">
        <div class="user-icon">
            <i class="material-icons">person</i>
        </div>

        <!-- Login -->
        <div class="card-section active" id="section-login">
            <h4 class="login-title">Bienvenido</h4>
            <p class="login-subtitle">Inicia sesión para continuar</p>
            <form action="/login" method="POST">
                <div class="input-field">
                    <i class="material-icons prefix">email</i>
                    <input type="email" name="email" id="login-email" required>
                    <label for="login-email">Correo electrónico</label>
                </div>
                <div class="input-field">
                    <i class="material-icons prefix">lock</i>
                    <input type="password" name="password" id="login-password" required>
                    <label for="login-password">Contraseña</label>
                    <i class="material-icons toggle-password" onclick="mostrarPassword('login-password', this)">visibility</i>
                </div>
                <div class="opcion">
                    <label>
                        <input type="checkbox" name="recordar">
                        <span>Recordarme</span>
                    </label>

                </div>
                <button class="btn waves-effect waves-light btn-login">Iniciar Sesión</button>
                <div class="divider transparent"></div>
                <p class="register">¿No tienes cuenta? <a class="toggle-link" onclick="mostrarSeccion('register')">Regístrate</a></p>
            </form>
        </div>

        <!-- Register -->
        <div class="card-section" id="section-register">
            <h4 class="login-title">Crear Cuenta</h4>
            <p class="login-subtitle">Regístrate para continuar</p>
            <form action="/register" method="POST">
                <div class="input-field">
                    <i class="material-icons prefix">person</i>
                    <input type="text" name="nombre" id="reg-nombre" required>
                    <label for="reg-nombre">Nombre completo</label>
                </div>
                <div class="input-field">
                    <i class="material-icons prefix">email</i>
                    <input type="email" name="correo" id="reg-email" required>
                    <label for="reg-email">Correo electrónico</label>
                </div>
                <div class="input-field">
                    <i class="material-icons prefix">lock</i>
                    <input type="password" name="contrasena" id="reg-password" oninput="medirFortaleza(this.value)" required minlength="8">
                    <label for="reg-password">Contraseña (mín. 8 caracteres)</label>
                    <i class="material-icons toggle-password" onclick="mostrarPassword('reg-password', this)">visibility</i>
                </div>
                <div id="strength-container" style="margin-bottom:12px;"></div>
                <input type="hidden" name="admin" value="1">
                <button class="btn waves-effect waves-light btn-login">Crear Cuenta</button>
                <div class="divider transparent"></div>
                <p class="register">¿Ya tienes cuenta? <a class="toggle-link" onclick="mostrarSeccion('login')">Inicia Sesión</a></p>
            </form>
        </div>


        <div id="mensaje-error" class="error-msg"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script>
        function mostrarPassword(inputId, el) {
            var input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                el.textContent = "visibility_off";
            } else {
                input.type = "password";
                el.textContent = "visibility";
            }
        }

        function mostrarSeccion(id) {
            document.querySelectorAll(".card-section").forEach(function(s) { s.classList.remove("active"); });
            document.getElementById("section-" + id).classList.add("active");
            document.getElementById("mensaje-error").textContent = "";
        }

        function medirFortaleza(val) {
            var c = document.getElementById("strength-container");
            if (val.length === 0) { c.innerHTML = ""; return; }
            var nivel = "weak";
            if (val.length >= 8 && /[A-Z]/.test(val) && /[0-9]/.test(val)) { nivel = "strong"; }
            else if (val.length >= 6) { nivel = "medium"; }
            var labels = { weak: "Débil", medium: "Media", strong: "Fuerte" };
            c.innerHTML = '<div class="strength-bar strength-' + nivel + '"></div><small style="color:#ccc;">Fortaleza: ' + labels[nivel] + "</small>";
        }

        function cargarCSRF(callback) {
            fetch('/api/csrf-token').then(function(r) { return r.json(); }).then(function(d) {
                if (d.csrf_token) {
                    window.csrfToken = d.csrf_token;
                    document.querySelectorAll('form').forEach(function(f) {
                        if (!f.querySelector('input[name="csrf_token"]')) {
                            var inp = document.createElement('input');
                            inp.type = 'hidden'; inp.name = 'csrf_token'; inp.value = d.csrf_token;
                            f.appendChild(inp);
                        }
                    });
                    if (callback) callback();
                }
            });
        }

        function ajaxCSRF(url, opts) {
            opts = opts || {};
            opts.headers = opts.headers || {};
            opts.headers['X-CSRF-Token'] = window.csrfToken || '';
            opts.headers['X-Requested-With'] = 'XMLHttpRequest';
            return fetch(url, opts);
        }

        cargarCSRF();

        var params = new URLSearchParams(window.location.search);

        var errors = {
            "credenciales": "Correo o contraseña incorrectos",
            "campos": "Completa todos los campos",
            "email_invalido": "Correo inválido",
            "nombre_invalido": "El nombre debe tener al menos 3 caracteres",
            "register_password": "La contraseña debe tener al menos 8 caracteres",
            "register_email": "El correo ya está registrado"
        };
        var errorParam = params.get("error");
        if (errorParam && errors[errorParam]) {
            document.getElementById("mensaje-error").textContent = errors[errorParam];
        }

        if (params.get("register") === "success" || params.get("ok") === "registrado") {
            document.getElementById("mensaje-error").style.color = "#a5d6a7";
            document.getElementById("mensaje-error").textContent = "Cuenta creada correctamente. Inicia sesión.";
        }
    </script>
</body>
</html>
