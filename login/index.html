 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- link del favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <!-- link de Materialize CSS -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <!-- link de los iconos que vamos a utlizar -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
    rel="stylesheet">
    <!-- enlace con el css -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- CAPA OSCURA -->
    <div class="overlay"></div>
    <!-- LOGIN -->
    <div class="login-card">
        <!-- ICONO -->
        <div class="user-icon">
            <i class="material-icons">
                person
            </i>
        </div>

        <!-- TITULO -->
        <h4 class="login-title">
            Bienvenido
        </h4>
        <p class="login-subtitle">
            Inicia sesión para continuar
        </p>

        <!-- formulario -->
        <form>
            <!-- email -->
            <div class="input-field">
                <i class="material-icons prefix">
                    email
                </i>
                <input type="email" id="email">
                <label for="email">
                    Correo electrónico
                </label>
            </div>

            <!-- contraseña -->
        <div class="input-field">
            <i class="material-icons prefix">
                lock
            </i>
            <input type="password" id="password">
            <label for="password">
                Contraseña
            </label>

            <!-- botón para mostrar y ocultar contraseña -->
            <i class="material-icons toggle-password"
            onclick="mostrarPassword()">
                visibility
            </i>

        </div>

            <!-- opciones -->
            <div class="opcion">
                <label>
                    <input type="checkbox">
                    <span>
                        Recordarme
                    </span>
                </label>
                <a href="#">
                    ¿Olvidaste tu contraseña?
                </a>
            </div>

            <!-- boton del login -->
            <button
            class="btn waves-effect waves-light btn-login">
                Iniciar Sesión
            </button>

            <!-- divader, es una linea separadora -->
            <div class="divider transparent"></div>

            <!-- boton de google -->
            <button
            class="btn white black-text google-btn">

                <i class="material-icons left red-text">
                    account_circle
                </i>
                Iniciar con Google
            </button>

            <!-- registro -->
            <p class="register">
                ¿No tienes cuenta?
                <a href="#">
                    Regístrate
                </a>
            </p>
        </form>
    </div>
        <!-- MATERIALIZE JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <!-- javascript -->
    <script>
        function mostrarPassword() {
            let input = document.getElementById("password");
            let icono = document.querySelector(".toggle-password");
            if (input.type === "password") {
                input.type = "text";
                icono.textContent = "visibility_off";
            } else {
                input.type = "password";
                icono.textContent = "visibility";
            }
        }
    </script>
</body>
</html>
